<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARP FB - Create account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #ffffff;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --input-bg: #f9fafb;
            --input-border: #e5e7eb;
            --input-border-focus: #4f46e5;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
            --error-border: #fca5a5;
            --success-bg: #ecfdf5;
            --success-text: #10b981;
            --success-border: #6ee7b7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        /* Borderless Premium Layout Wrapper */
        .portal-wrapper {
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        /* High-End Notification Alert */
        .custom-alert {
            display: none;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 28px;
            font-size: 0.95rem;
            font-weight: 500;
            align-items: center;
            gap: 12px;
            animation: fadeInBlur 0.3s ease-out forwards;
        }

        .custom-alert.success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: var(--success-border);
        }

        @keyframes fadeInBlur {
            from { transform: translateY(-8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .portal-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .portal-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .portal-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Professional Field Groups */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.05rem;
            transition: color 0.2s ease;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px 16px 52px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            border-color: var(--input-border-focus);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-input:focus + i {
            color: var(--primary);
        }

        .name-row {
            display: flex;
            gap: 16px;
        }

        /* Premium Buttons */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        /* Footer Switching */
        .form-toggle-text {
            text-align: center;
            margin-top: 32px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .form-toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: color 0.2s ease;
        }

        .form-toggle-text a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="portal-wrapper">
        <div id="authAlert" class="custom-alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="alertText">Notification description.</span>
        </div>

        <div id="signUpView">
            <div class="portal-header">
                <h2>SHARP FB</h2>
                <p>Register below for full access credentials.</p>
            </div>
            <form id="signUpForm" onsubmit="executeSignUp(event)">
                <div class="name-row">
                    <div class="input-group">
                        <input type="text" id="regFirst" class="form-input" placeholder="First name" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="input-group">
                        <input type="text" id="regLast" class="form-input" placeholder="Last name" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" class="form-input" placeholder="Email address" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="regPass" class="form-input" placeholder="Password (min. 5 characters)" required minlength="5">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" class="form-input" placeholder="Confirm password" required minlength="5">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <button type="submit" class="submit-btn">Create account</button>
            </form>
            <div class="form-toggle-text">
                Already have an account?<a href="#" onclick="switchView('login')">Sign in</a>
            </div>
        </div>

        <div id="loginView" class="hidden">
            <div class="portal-header">
                <h2>Welcome back</h2>
                <p>Enter your authorization credentials to sign in.</p>
            </div>
            <form id="loginForm" onsubmit="executeLogin(event)">
                <div class="input-group">
                    <input type="email" id="loginEmail" class="form-input" placeholder="Email address" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="form-input" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="submit-btn">Sign in</button>
            </form>
            <div class="form-toggle-text">
                Don't have an account?<a href="#" onclick="switchView('signup')">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        // Check if user is already authenticated
        if (localStorage.getItem('userAuthenticated') === 'true') {
            window.location.href = 'user.html';
        }

        // Display alerts dynamically
        function deployAlert(msg, successMode = false) {
            const alertContainer = document.getElementById('authAlert');
            const alertText = document.getElementById('alertText');
            
            alertText.textContent = msg;
            alertContainer.style.display = 'flex';
            
            if (successMode) {
                alertContainer.classList.add('success');
                alertContainer.querySelector('i').className = 'fa-solid fa-circle-check';
            } else {
                alertContainer.classList.remove('success');
                alertContainer.querySelector('i').className = 'fa-solid fa-circle-exclamation';
            }
        }

        // Switch screens instantly
        function switchView(target) {
            document.getElementById('authAlert').style.display = 'none';
            if (target === 'login') {
                document.getElementById('signUpView').classList.add('hidden');
                document.getElementById('loginView').classList.remove('hidden');
            } else {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('signUpView').classList.remove('hidden');
            }
        }

        // Sign Up Controller
        function executeSignUp(e) {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;
            const confirmPassword = document.getElementById('regConfirm').value;

            // CRITICAL STEP: One-time registration restriction check
            const existingUser = localStorage.getItem('savedEmail');
            if (existingUser) {
                deployAlert("An account already exists on this system! Redirecting...");
                setTimeout(() => {
                    switchView('login');
                }, 1500);
                return;
            }

            if (password.length < 5) {
                deployAlert("Password must be at least 5 characters long.");
                return;
            }

            if (password !== confirmPassword) {
                deployAlert("Your security passwords do not match.");
                return;
            }

            // Save data locally
            localStorage.setItem('savedEmail', email);
            localStorage.setItem('savedPassword', password);

            deployAlert("Account registered successfully! Redirecting to login...", true);
            
            setTimeout(() => {
                switchView('login');
                document.getElementById('loginEmail').value = email;
            }, 1400);
        }

        // Login Logic Controller
        function executeLogin(e) {
            e.preventDefault();

            const typedEmail = document.getElementById('loginEmail').value.trim();
            const typedPassword = document.getElementById('loginPassword').value;

            const savedEmail = localStorage.getItem('savedEmail');
            const savedPassword = localStorage.getItem('savedPassword');

            if (typedEmail === savedEmail && typedPassword === savedPassword) {
                localStorage.setItem('userAuthenticated', 'true');
                window.location.href = 'user.html';
            } else {
                deployAlert("Incorrect password or email address.");
            }
        }
    </script>
</body>
</html>
